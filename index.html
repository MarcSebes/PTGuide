<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PT Guide</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>
  <body>
    <div class="app-shell">
      <main class="app-card">
        <section class="session-panel">
          <div class="progress-meta">
            <div>
              <span class="meta-label">Exercise</span>
              <strong id="exercise-position">1 of 3</strong>
            </div>
            <div>
              <span class="meta-label">Status</span>
              <strong id="phase-label">Ready</strong>
            </div>
          </div>

          <article class="current-step">
            <div class="step-header">
              <p id="step-kicker" class="step-kicker">Up first</p>
              <h2 id="exercise-name">Wall Sits</h2>
              <p id="exercise-detail" class="exercise-detail">
                45 second hold, 1 minute rest, 5 sets
              </p>
            </div>

            <div class="countdown-wrap">
              <div class="countdown-ring">
                <svg viewBox="0 0 120 120" class="ring-svg" aria-hidden="true">
                  <circle class="ring-track" cx="60" cy="60" r="52"></circle>
                  <circle
                    id="ring-progress"
                    class="ring-progress"
                    cx="60"
                    cy="60"
                    r="52"
                  ></circle>
                </svg>
                <div class="countdown-content">
                  <p id="countdown-caption" class="countdown-caption">
                    Tap start to begin
                  </p>
                  <div id="countdown-value" class="countdown-value">Start</div>
                </div>
              </div>
            </div>

            <div id="set-progress" class="set-progress">Set 1 of 5</div>

            <div id="manual-panel" class="manual-panel hidden">
              <p>Heel Slides are reps-based.</p>
              <button id="complete-set-button" class="secondary-button">
                Complete set
              </button>
            </div>

            <div class="controls">
              <button id="start-button" class="primary-button">Start</button>
              <button id="pause-button" class="secondary-button hidden">
                Pause
              </button>
              <button id="resume-button" class="secondary-button hidden">
                Resume
              </button>
              <button id="reset-button" class="ghost-button">Reset</button>
            </div>
          </article>

          <section class="program-list">
            <h3>Program</h3>
            <div id="exercise-list"></div>
          </section>
        </section>
      </main>

      <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
